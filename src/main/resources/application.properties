spring.application.name=cloud

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/marketplace_mvp?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGGING SQL (opcional pero útil)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=VGVzdFNlY3JldEtleUZvckpXVFRlc3RJbkJhc2U2NF9LZXlfMjU2X0JpdHM=
jwt.expiration=86400000
